<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalesAI — SDR Assessment</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .nav {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    .nav a {
      color: #60a5fa;
      font-size: 0.85rem;
      text-decoration: none;
      font-weight: 500;
    }

    .nav a:hover { text-decoration: underline; }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: #94a3b8;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .progress-bar {
      background: #1e2537;
      border-radius: 99px;
      height: 4px;
      margin-bottom: 36px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .question-card {
      background: #1a1f2e;
      border: 1px solid #2d3448;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .question-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #60a5fa;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #e2e8f0;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3448;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.95rem;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      min-height: 110px;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    textarea:focus { outline: none; border-color: #60a5fa; }
    textarea::placeholder { color: #4a5568; }

    .char-count {
      text-align: right;
      font-size: 0.75rem;
      color: #4a5568;
      margin-top: 6px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.9; }

    /* Name prompt */
    .name-card {
      background: #1a1f2e;
      border: 1px solid #2d3448;
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      margin-bottom: 24px;
    }

    .name-card h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .name-card p {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .name-input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3448;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 1rem;
      padding: 14px 16px;
      margin-bottom: 16px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .name-input:focus { outline: none; border-color: #60a5fa; }
    .name-input::placeholder { color: #4a5568; }

    /* Results */
    .result-card {
      background: #1a1f2e;
      border: 1px solid #2d3448;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .result-candidate {
      text-align: center;
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    .score-ring {
      text-align: center;
      margin-bottom: 28px;
    }

    .score-number {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .score-label { color: #94a3b8; font-size: 0.85rem; margin-top: 4px; }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-top: 12px;
    }

    .badge-strong  { background: #064e3b; color: #6ee7b7; }
    .badge-hire    { background: #1e3a5f; color: #93c5fd; }
    .badge-consider { background: #3b2f10; color: #fcd34d; }
    .badge-reject  { background: #4c1414; color: #fca5a5; }

    .summary {
      color: #cbd5e1;
      line-height: 1.7;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 10px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tag { padding: 4px 12px; border-radius: 99px; font-size: 0.82rem; }
    .tag-strength { background: #0d2b1f; color: #6ee7b7; border: 1px solid #064e3b; }
    .tag-concern  { background: #2b0d0d; color: #fca5a5; border: 1px solid #4c1414; }

    .dims { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .dim-label {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .dim-bar { background: #0f1117; border-radius: 99px; height: 6px; overflow: hidden; }
    .dim-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #60a5fa, #a78bfa); }

    .error-box {
      background: #2b0d0d;
      border: 1px solid #4c1414;
      border-radius: 12px;
      color: #fca5a5;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    .loading { text-align: center; padding: 60px 20px; }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #2d3448;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #64748b; font-size: 0.9rem; }

    .btn-restart {
      background: #1e2537;
      color: #94a3b8;
      border: 1px solid #2d3448;
      margin-top: 8px;
    }

    .btn-restart:hover { background: #2d3448; color: #e2e8f0; }

    .saved-notice {
      text-align: center;
      font-size: 0.82rem;
      color: #6ee7b7;
      margin-top: 12px;
    }

    /* API key section */
    .key-section {
      background: #1a1f2e;
      border: 1px solid #2d3448;
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 28px;
    }

    .key-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .key-label {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #94a3b8;
    }

    .key-link {
      font-size: 0.78rem;
      color: #60a5fa;
      text-decoration: none;
    }

    .key-link:hover { text-decoration: underline; }

    .key-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .key-input {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3448;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 10px 14px;
      font-family: monospace;
      transition: border-color 0.2s;
    }

    .key-input:focus { outline: none; border-color: #60a5fa; }
    .key-input::placeholder { color: #4a5568; font-family: inherit; }

    .key-status {
      font-size: 0.78rem;
      margin-top: 8px;
    }

    .key-status-ok { color: #6ee7b7; }
    .key-status-missing { color: #94a3b8; }

    .no-key-notice {
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      padding: 20px 0 8px;
    }

    @media (max-width: 480px) {
      .dims { grid-template-columns: 1fr; }
      .score-number { font-size: 3rem; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const BADGE = {
  "Strong Hire": "badge-strong",
  "Hire": "badge-hire",
  "Consider": "badge-consider",
  "Reject": "badge-reject",
};

function DimBar({ label, value }) {
  return (
    <div className="dim-item">
      <div className="dim-label">
        <span>{label}</span>
        <span>{value}</span>
      </div>
      <div className="dim-bar">
        <div className="dim-fill" style={{ width: `${value}%` }} />
      </div>
    </div>
  );
}

const GROQ_SESSION_KEY = "groq_api_key";

const PROMPT_TEMPLATE = (qa) => `You are a sales hiring expert evaluating an SDR (Sales Development Representative) candidate.

Score the following candidate responses on a scale of 0–100 and provide a hiring recommendation.

Evaluate across these dimensions:
- Resilience & objection handling
- Drive & self-motivation
- Process & preparation
- Communication clarity
- Closing instinct

---
${qa}
---

Respond ONLY with valid JSON in this exact format (no markdown, no extra text):
{
  "score": <integer 0-100>,
  "recommendation": "<Strong Hire | Hire | Consider | Reject>",
  "summary": "<2-3 sentence overall assessment>",
  "strengths": ["<strength 1>", "<strength 2>"],
  "concerns": ["<concern 1>", "<concern 2>"],
  "dimension_scores": {
    "resilience": <0-100>,
    "drive": <0-100>,
    "process": <0-100>,
    "communication": <0-100>,
    "closing": <0-100>
  }
}`;

// Screens: "form" | "scoring" | "name" | "result"
function App() {
  const [questions, setQuestions]   = useState([]);
  const [answers, setAnswers]       = useState([]);
  const [screen, setScreen]         = useState("form");
  const [pendingResult, setPending] = useState(null);
  const [candidateName, setName]    = useState("");
  const [result, setResult]         = useState(null);
  const [error, setError]           = useState(null);
  const [loadingQ, setLoadingQ]     = useState(true);
  const [saved, setSaved]           = useState(false);
  const [groqKey, setGroqKey]       = useState(() => sessionStorage.getItem(GROQ_SESSION_KEY) || "");

  useEffect(() => {
    fetch("/api/questions")
      .then(r => r.json())
      .then(d => {
        setQuestions(d.questions);
        setAnswers(new Array(d.questions.length).fill(""));
        setLoadingQ(false);
      })
      .catch(() => {
        setError("Failed to load questions.");
        setLoadingQ(false);
      });
  }, []);

  const filled = answers.filter(a => a.trim().length >= 20).length;
  const allFilled = questions.length > 0 && filled === questions.length;
  const progress = questions.length ? (filled / questions.length) * 100 : 0;
  const hasKey = groqKey.trim().length > 0;

  function handleKeyChange(e) {
    const val = e.target.value;
    setGroqKey(val);
    if (val.trim()) {
      sessionStorage.setItem(GROQ_SESSION_KEY, val.trim());
    } else {
      sessionStorage.removeItem(GROQ_SESSION_KEY);
    }
  }

  async function handleSubmit() {
    setError(null);
    setScreen("scoring");
    try {
      const qa = questions.map((q, i) => `Q${i + 1}: ${q}\nA${i + 1}: ${answers[i]}`).join("\n\n");
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${groqKey.trim()}`,
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          max_tokens: 600,
          messages: [{ role: "user", content: PROMPT_TEMPLATE(qa) }],
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || "Groq API error");
      const raw = data.choices[0].message.content.trim();
      const scored = JSON.parse(raw);
      setPending(scored);
      setScreen("name");
    } catch (e) {
      setError(e.message);
      setScreen("form");
    }
  }

  async function handleSave() {
    if (!candidateName.trim()) return;
    try {
      await fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: candidateName.trim(), result: pendingResult }),
      });
      setSaved(true);
    } catch (_) {}
    setResult(pendingResult);
    setScreen("result");
  }

  function handleRestart() {
    setScreen("form");
    setAnswers(new Array(questions.length).fill(""));
    setResult(null);
    setPending(null);
    setName("");
    setError(null);
    setSaved(false);
  }

  if (loadingQ) return (
    <div className="container">
      <div className="loading"><div className="spinner" /><p>Loading assessment…</p></div>
    </div>
  );

  return (
    <div className="container">
      <div className="nav">
        <a href="/results.html">View All Results →</a>
      </div>

      <div className="header">
        <h1>SalesAI Assessment</h1>
        <p>SDR Candidate Evaluation — 5 Questions</p>
      </div>

      {/* FORM */}
      {screen === "form" && (
        <>
          {/* Groq API Key */}
          <div className="key-section">
            <div className="key-section-header">
              <span className="key-label">Groq API Key</span>
              <a
                className="key-link"
                href="https://console.groq.com/keys"
                target="_blank"
                rel="noopener noreferrer"
              >
                Get free key at console.groq.com/keys →
              </a>
            </div>
            <div className="key-input-row">
              <input
                className="key-input"
                type="password"
                placeholder="gsk_…"
                value={groqKey}
                onChange={handleKeyChange}
                autoComplete="off"
                spellCheck={false}
              />
            </div>
            <div className={`key-status ${hasKey ? "key-status-ok" : "key-status-missing"}`}>
              {hasKey ? "Key saved for this session" : "No key entered — AI scoring disabled"}
            </div>
          </div>

          <div className="progress-bar">
            <div className="progress-fill" style={{ width: `${progress}%` }} />
          </div>

          {error && <div className="error-box">{error}</div>}

          {questions.map((q, i) => (
            <div className="question-card" key={i}>
              <div className="question-label">Question {i + 1} of {questions.length}</div>
              <div className="question-text">{q}</div>
              <textarea
                placeholder="Type your answer here (min 20 characters)…"
                value={answers[i]}
                onChange={e => {
                  const next = [...answers];
                  next[i] = e.target.value;
                  setAnswers(next);
                }}
              />
              <div className="char-count">{answers[i].length} chars</div>
            </div>
          ))}

          {!hasKey ? (
            <div className="no-key-notice">Add your Groq key above to enable AI scoring</div>
          ) : (
            <button className="btn btn-primary" disabled={!allFilled} onClick={handleSubmit}>
              Submit & Score ({filled}/{questions.length} answered)
            </button>
          )}
        </>
      )}

      {/* SCORING */}
      {screen === "scoring" && (
        <div className="loading">
          <div className="spinner" />
          <p>AI is evaluating responses…</p>
        </div>
      )}

      {/* NAME PROMPT */}
      {screen === "name" && (
        <div className="name-card">
          <h2>Assessment complete</h2>
          <p>Enter the candidate's name to save and view results.</p>
          <input
            className="name-input"
            type="text"
            placeholder="Full name (e.g. John Smith)"
            value={candidateName}
            onChange={e => setName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleSave()}
            autoFocus
          />
          <button
            className="btn btn-primary"
            disabled={!candidateName.trim()}
            onClick={handleSave}
          >
            Save & View Results
          </button>
        </div>
      )}

      {/* RESULT */}
      {screen === "result" && result && (
        <>
          <div className="result-card">
            {candidateName && (
              <div className="result-candidate">Candidate: {candidateName}</div>
            )}
            <div className="score-ring">
              <div className="score-number">{result.score}</div>
              <div className="score-label">Overall Score / 100</div>
              <div>
                <span className={`badge ${BADGE[result.recommendation] || "badge-consider"}`}>
                  {result.recommendation}
                </span>
              </div>
            </div>

            <p className="summary">{result.summary}</p>

            {result.strengths?.length > 0 && (
              <>
                <div className="section-title">Strengths</div>
                <div className="tag-list">
                  {result.strengths.map((s, i) => (
                    <span key={i} className="tag tag-strength">{s}</span>
                  ))}
                </div>
              </>
            )}

            {result.concerns?.length > 0 && (
              <>
                <div className="section-title">Concerns</div>
                <div className="tag-list">
                  {result.concerns.map((c, i) => (
                    <span key={i} className="tag tag-concern">{c}</span>
                  ))}
                </div>
              </>
            )}

            {result.dimension_scores && (
              <>
                <div className="section-title" style={{ marginTop: 8 }}>Dimension Scores</div>
                <div className="dims">
                  {Object.entries(result.dimension_scores).map(([k, v]) => (
                    <DimBar key={k} label={k.charAt(0).toUpperCase() + k.slice(1)} value={v} />
                  ))}
                </div>
              </>
            )}
          </div>

          {saved && <div className="saved-notice">Saved to database</div>}
          {error && <div className="error-box">{error}</div>}

          <button className="btn btn-restart" onClick={handleRestart}>
            Start New Assessment
          </button>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
