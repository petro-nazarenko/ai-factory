<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Background -->
  <rect width="80" height="80" rx="12" fill="#0d1117"/>

  <!-- Gear teeth (8 teeth) -->
  <g transform="translate(40,40)" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round">
    <line x1="0"    y1="-20" x2="0"    y2="-26"/>
    <line x1="14.1" y1="-14.1" x2="18.4" y2="-18.4"/>
    <line x1="20"   y1="0"   x2="26"   y2="0"/>
    <line x1="14.1" y1="14.1"  x2="18.4" y2="18.4"/>
    <line x1="0"    y1="20"  x2="0"    y2="26"/>
    <line x1="-14.1" y1="14.1" x2="-18.4" y2="18.4"/>
    <line x1="-20"  y1="0"   x2="-26"  y2="0"/>
    <line x1="-14.1" y1="-14.1" x2="-18.4" y2="-18.4"/>
  </g>

  <!-- Gear outer ring -->
  <circle cx="40" cy="40" r="20" fill="none" stroke="#00ff88" stroke-width="2"/>

  <!-- Inner fill -->
  <circle cx="40" cy="40" r="18" fill="#0d1117"/>

  <!-- Circuit traces -->
  <g transform="translate(40,40)" stroke="#00ff88" stroke-width="1.2" fill="none" opacity="0.7">
    <polyline points="0,-13 0,-6 -7,-6 -7,0"/>
    <polyline points="0,-13 0,-6  7,-6  7,0"/>
    <polyline points="-13,0 -7,0"/>
    <polyline points=" 13,0  7,0"/>
    <polyline points="0,13  0,6 -5,6 -5,2"/>
    <polyline points="0,13  0,6  5,6  5,2"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="#00ff88">
    <circle cx="40" cy="27" r="2"/>
    <circle cx="53" cy="40" r="2"/>
    <circle cx="40" cy="53" r="2"/>
    <circle cx="27" cy="40" r="2"/>
    <circle cx="33" cy="40" r="1.5"/>
    <circle cx="47" cy="40" r="1.5"/>
    <circle cx="35" cy="46" r="1.5"/>
    <circle cx="45" cy="46" r="1.5"/>
  </g>

  <!-- Center dot -->
  <circle cx="40" cy="40" r="4" fill="#00ff88" opacity="0.15"/>
  <circle cx="40" cy="40" r="4" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <circle cx="40" cy="40" r="1.5" fill="#00ff88"/>
</svg>
