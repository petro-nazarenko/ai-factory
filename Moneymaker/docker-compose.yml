services:

  # ── Control Plane ────────────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Agent Workers ─────────────────────────────────────────────────────────
  worker:
    build: .
    command: >
      celery -A workers.celery_app worker
        --loglevel=info
        --concurrency=4
        --queues=celery
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  # ── Celery Beat — fires a cycle every LOOP_INTERVAL_HOURS ─────────────────
  beat:
    build: .
    command: >
      celery -A workers.celery_app beat
        --loglevel=info
        --schedule=/tmp/celerybeat-schedule
    env_file: .env
    depends_on:
      - worker
    restart: unless-stopped
    logging: *default-logging

  # ── Celery Flower — task dashboard ────────────────────────────────────────
  flower:
    build: .
    command: >
      celery -A workers.celery_app flower
        --port=5555
        --broker_api=redis://redis:6379/0
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
    logging: *default-logging

  # ── Infrastructure ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: moneymaker
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d moneymaker"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  # ── Observability ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    logging: *default-logging

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    restart: unless-stopped
    logging: *default-logging

volumes:
  pg_data:
  redis_data:
  prometheus_data:
  grafana_data:
